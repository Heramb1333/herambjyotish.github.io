<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heramb Jyotish - Spiritual Guidance & Healing</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ganesha-green: #2E8B57;
            --emerald-green: #228B22;
            --gold-accent: #DAA520;
            --soft-cream: #F0F8F0;
            --deep-charcoal: #2F4F4F;
            --mystical-purple: #8A2BE2;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--deep-charcoal);
            background: 
                radial-gradient(circle at 20% 50%, rgba(46,139,87,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(218,165,32,0.1) 0%, transparent 50%),
                linear-gradient(135deg, var(--soft-cream) 0%, #E6F3E6 100%);
            overflow-x: hidden;
            position: relative;
        }

        /* Twinkling stars */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(1.5px 1.5px at 30px 40px, #DAA520, transparent),
                radial-gradient(1px 1px at 80px 70px, var(--ganesha-green), transparent),
                radial-gradient(1px 1px at 120px 30px, #DAA520, transparent),
                radial-gradient(2px 2px at 200px 100px, var(--mystical-purple), transparent);
            background-repeat: repeat;
            background-size: 250px 200px;
            animation: twinkle 15s ease-in-out infinite;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* Header */
        header {
            background: rgba(47, 79, 79, 0.95);
            backdrop-filter: blur(15px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-family: 'Crimson Text', serif;
            font-size: 2.2rem;
            background: linear-gradient(45deg, var(--ganesha-green), var(--emerald-green), var(--mystical-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            font-weight: 700;
            animation: ganeshaGlow 3s ease-in-out infinite alternate;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        @keyframes ganeshaGlow {
            0% { text-shadow: 0 0 10px var(--ganesha-green); }
            100% { text-shadow: 0 0 20px var(--ganesha-green), 0 0 30px var(--emerald-green); }
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 400;
            transition: all 0.3s;
            padding: 0.5rem 1rem;
            border-radius: 25px;
        }

        .nav-links a:hover {
            color: var(--gold-accent);
            transform: translateY(-2px);
            background: rgba(218,165,32,0.2);
        }

        .social-buttons {
            display: flex;
            gap: 1rem;
        }

        /* Button Styles */
        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s;
            border: 2px solid transparent;
            text-align: center;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--ganesha-green), var(--emerald-green));
            color: white;
            box-shadow: 0 6px 25px rgba(46,139,87,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(46,139,87,0.6);
            border-color: var(--gold-accent);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border-color: rgba(255,255,255,0.6);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
            border-color: white;
        }

        .whatsapp-btn, .insta-btn {
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .whatsapp-btn {
            background: linear-gradient(45deg, var(--ganesha-green), var(--emerald-green));
            color: white;
            box-shadow: 0 4px 20px rgba(46,139,87,0.4);
        }

        .whatsapp-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(46,139,87,0.6);
        }

        .insta-btn {
            background: linear-gradient(45deg, #E4405F, #F77737);
            color: white;
            box-shadow: 0 4px 20px rgba(228,64,95,0.4);
        }

        .insta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(228,64,95,0.6);
        }

        /* Mobile Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 4px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background: white;
            transition: 0.3s;
        }

        /* Hero */
        .hero {
            height: 100vh;
            background: 
                linear-gradient(135deg, rgba(47,79,79,0.8) 0%, rgba(46,139,87,0.7) 100%),
                radial-gradient(circle at center, rgba(218,165,32,0.3) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            padding: 0 2rem;
        }

        .hero::before {
            content: '🕉️';
            position: absolute;
            font-size: 8rem;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
            z-index: 1;
        }

        .hero::after {
            content: '⭐⭐⭐✨⭐';
            position: absolute;
            font-size: 2rem;
            animation: float 4s ease-in-out infinite;
            top: 20%; 
            right: 10%;
            opacity: 0.8;
            z-index: 1;
        }

        .hero-content {
            max-width: 800px;
            z-index: 2;
            position: relative;
        }

        .hero-content h1 {
            font-family: 'Crimson Text', serif;
            font-size: clamp(2.5rem, 5vw, 4.2rem);
            margin-bottom: 1.5rem;
            animation: fadeInUp 1s ease;
            text-shadow: 0 0 30px rgba(255,255,255,0.8);
            line-height: 1.2;
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 2.5rem;
            opacity: 0.95;
            font-weight: 300;
        }

        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Services */
        .services {
            padding: 100px 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-family: 'Crimson Text', serif;
            font-size: clamp(2rem, 4vw, 2.8rem);
            margin-bottom: 3rem;
            color: var(--deep-charcoal);
            position: relative;
        }

        .section-title::after {
            content: '✨';
            position: absolute;
            font-size: 2rem;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .service-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 2rem;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            transition: all 0.4s;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--ganesha-green), var(--gold-accent), var(--emerald-green));
        }

        .service-card:hover {
            transform: translateY(-15px);
            box-shadow: 0 25px 70px rgba(46,139,87,0.3);
            border-color: var(--ganesha-green);
        }

        .service-card h3 {
            font-family: 'Crimson Text', serif;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--deep-charcoal);
        }

        .service-icon {
            font-size: 4rem;
            color: var(--ganesha-green);
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }

        .service-card:hover .service-icon {
            transform: scale(1.1) rotate(5deg);
            text-shadow: 0 0 20px var(--ganesha-green);
        }

        /* Reviews */
        .reviews {
            padding: 100px 2rem;
            max-width: 1200px;
            margin: 0 auto;
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(240,248,240,0.9));
        }

        .reviews-grid {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 2rem;
            padding: 2rem 0;
            scrollbar-width: none;
        }

        .reviews-grid::-webkit-scrollbar {
            display: none;
        }

        .review-card {
            flex: 0 0 350px;
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 2px solid rgba(46,139,87,0.2);
            scroll-snap-align: center;
            transition: all 0.3s;
        }

        .review-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 80px rgba(46,139,87,0.2);
        }

        .review-stars {
            color: var(--gold-accent);
            font-size: 1.5rem;
            margin: 1rem 0;
        }

        .review-card h4 {
            color: var(--deep-charcoal);
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        /* Book Section */
        .book-section {
            background: linear-gradient(135deg, var(--ganesha-green) 0%, var(--emerald-green) 100%);
            color: white;
            padding: 120px 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .book-section::before {
            content: '500+ Happy Clients';
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .book-form {
            max-width: 600px;
            margin: 0 auto;
        }

        .book-form h2 {
            font-family: 'Crimson Text', serif;
            font-size: clamp(2rem, 4vw, 2.8rem);
            margin-bottom: 1.5rem;
        }

        .book-form > p {
            font-size: 1.3rem;
            margin-bottom: 3rem;
            opacity: 0.95;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: rgba(255,255,255,0.95);
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            background: rgba(255,255,255,0.95);
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(218,165,32,0.3);
            transform: translateY(-2px);
        }

        /* Floating WhatsApp */
        .floating-whatsapp {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 70px;
            height: 70px;
            background: linear-gradient(45deg, var(--ganesha-green), var(--emerald-green));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.8rem;
            box-shadow: 0 10px 30px rgba(46,139,87,0.6);
            z-index: 9999;
            cursor: pointer;
            transition: all 0.3s;
            animation: pulse 2s infinite;
            text-decoration: none;
        }

        .floating-whatsapp:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 40px rgba(46,139,87,0.8);
        }

        @keyframes pulse {
            0% { box-shadow: 0 10px 30px rgba(46,139,87,0.6); }
            50% { box-shadow: 0 0 0 0 rgba(46,139,87,0.8); }
            100% { box-shadow: 0 10px 30px rgba(46,139,87,0.6); }
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            right: -100%;
            width: 80%;
            max-width: 300px;
            height: 100vh;
            background: rgba(47, 79, 79, 0.98);
            backdrop-filter: blur(20px);
            transition: right 0.3s ease;
            z-index: 1001;
            padding: 5rem 2rem 2rem;
